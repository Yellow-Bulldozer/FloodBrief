<svg width="860" height="420" viewBox="0 0 860 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FloodBrief vs majority baseline</title>
  <desc id="desc">Grouped bar chart comparing FloodBrief and the majority-class baseline across segmentation metrics.</desc>
  <style>
    .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
    .label { font: 12px Arial, sans-serif; fill: #334155; }
    .tick { font: 11px Arial, sans-serif; fill: #64748b; }
    .value { font: 11px Arial, sans-serif; fill: #0f172a; }
    .legend { font: 12px Arial, sans-serif; fill: #0f172a; }
  </style>
  <rect width="860" height="420" fill="#f8fafc"/>
  <text x="40" y="36" class="title">FloodBrief vs Majority Baseline</text>
  <text x="40" y="58" class="label">Recorded evaluation metrics from the submission benchmark summary</text>

  <line x1="70" y1="340" x2="810" y2="340" stroke="#94a3b8" stroke-width="1"/>
  <line x1="70" y1="300" x2="810" y2="300" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="70" y1="260" x2="810" y2="260" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="70" y1="220" x2="810" y2="220" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="70" y1="180" x2="810" y2="180" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="70" y1="140" x2="810" y2="140" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="70" y1="100" x2="810" y2="100" stroke="#e2e8f0" stroke-width="1"/>

  <text x="44" y="344" class="tick">0.0</text>
  <text x="44" y="304" class="tick">0.2</text>
  <text x="44" y="264" class="tick">0.4</text>
  <text x="44" y="224" class="tick">0.6</text>
  <text x="44" y="184" class="tick">0.8</text>
  <text x="44" y="144" class="tick">1.0</text>

  <rect x="120" y="123" width="34" height="217" fill="#0ea5e9" rx="4"/>
  <rect x="160" y="228" width="34" height="112" fill="#94a3b8" rx="4"/>
  <text x="137" y="116" text-anchor="middle" class="value">0.904</text>
  <text x="177" y="221" text-anchor="middle" class="value">0.467</text>
  <text x="157" y="362" text-anchor="middle" class="label">mIoU</text>

  <rect x="235" y="142" width="34" height="198" fill="#0ea5e9" rx="4"/>
  <rect x="275" y="340" width="34" height="0" fill="#94a3b8" rx="4"/>
  <text x="252" y="135" text-anchor="middle" class="value">0.824</text>
  <text x="292" y="333" text-anchor="middle" class="value">0.000</text>
  <text x="272" y="362" text-anchor="middle" class="label">Flood IoU</text>

  <rect x="350" y="124" width="34" height="216" fill="#0ea5e9" rx="4"/>
  <rect x="390" y="340" width="34" height="0" fill="#94a3b8" rx="4"/>
  <text x="367" y="117" text-anchor="middle" class="value">0.903</text>
  <text x="407" y="333" text-anchor="middle" class="value">0.000</text>
  <text x="387" y="362" text-anchor="middle" class="label">F1</text>

  <rect x="465" y="142" width="34" height="198" fill="#0ea5e9" rx="4"/>
  <rect x="505" y="340" width="34" height="0" fill="#94a3b8" rx="4"/>
  <text x="482" y="135" text-anchor="middle" class="value">0.825</text>
  <text x="522" y="333" text-anchor="middle" class="value">0.000</text>
  <text x="502" y="362" text-anchor="middle" class="label">Precision</text>

  <rect x="580" y="100" width="34" height="240" fill="#0ea5e9" rx="4"/>
  <rect x="620" y="340" width="34" height="0" fill="#94a3b8" rx="4"/>
  <text x="597" y="93" text-anchor="middle" class="value">0.998</text>
  <text x="637" y="333" text-anchor="middle" class="value">0.000</text>
  <text x="617" y="362" text-anchor="middle" class="label">Recall</text>

  <rect x="695" y="103" width="34" height="237" fill="#0ea5e9" rx="4"/>
  <rect x="735" y="116" width="34" height="224" fill="#94a3b8" rx="4"/>
  <text x="712" y="96" text-anchor="middle" class="value">0.986</text>
  <text x="752" y="109" text-anchor="middle" class="value">0.933</text>
  <text x="732" y="362" text-anchor="middle" class="label">Accuracy</text>

  <rect x="590" y="30" width="14" height="14" fill="#0ea5e9" rx="2"/>
  <text x="612" y="41" class="legend">FloodBrief</text>
  <rect x="700" y="30" width="14" height="14" fill="#94a3b8" rx="2"/>
  <text x="722" y="41" class="legend">Majority baseline</text>
